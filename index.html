<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A responsive React CRUD application for managing JSONPlaceholder users, styled as an Apple HIG-inspired liquid glass interface."
    />
    <meta name="theme-color" content="#eef1f7" />
    <title>User Directory — Liquid Glass</title>
    <script>
      // Applied synchronously, before any CSS paints, so the correct theme
      // is in place immediately — no flash of light-then-dark (or vice
      // versa) while React hydrates. ThemeContext.tsx re-reads the same
      // localStorage key on mount and keeps this in sync from then on.
      (function () {
        try {
          var stored = localStorage.getItem("usermanager_theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          if (theme === "dark") {
            document.documentElement.classList.add("dark-mode");
          }
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          // localStorage may be unavailable (e.g. privacy mode) — fall
          // back to the light default already set in CSS.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
